# Production overrides for docker-compose.
#
# Usage:
#   docker compose -f docker-compose.yml -f deploy/docker-compose.prod.yml up -d
#
# This file is a *skeleton* — Task 33 hardens it with real auth secrets,
# resource limits, TLS, and log shipping.

services:
  go:
    restart: always
    environment:
      LOG_LEVEL: info
      # Override with real values via .env.prod or your secrets manager:
      AGENTMEMORY_SECRET: ${AGENTMEMORY_SECRET:?must be set}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?must be set}
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
      restart_policy:
        condition: any
        max_attempts: 10

  py:
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  neo4j:
    deploy:
      resources:
        limits:
          memory: 2G

  rabbitmq:
    deploy:
      resources:
        limits:
          memory: 512M
