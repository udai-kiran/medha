<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>agent_mem — live viewer</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
         margin: 0; padding: 1rem 2rem; background: #0f1115; color: #e7eaf0; }
  h1 { margin: 0 0 .5rem; font-size: 1.15rem; }
  #status { font-size: .85rem; color: #8b95a7; margin-bottom: 1rem; }
  #status.ok { color: #4ade80; }
  table { width: 100%; border-collapse: collapse; font-size: .85rem; }
  th, td { text-align: left; padding: .35rem .5rem; border-bottom: 1px solid #1f2330; vertical-align: top; }
  th { background: #161a25; position: sticky; top: 0; color: #8b95a7; font-weight: 500; }
  tr:hover { background: #131724; }
  .type-observation { color: #93c5fd; }
  .type-memory      { color: #a78bfa; }
  .type-system      { color: #fbbf24; }
  .type-session     { color: #4ade80; }
  pre { margin: 0; white-space: pre-wrap; font-family: ui-monospace, SFMono-Regular, monospace; font-size: .8rem; color: #c9d1de; }
</style>
</head>
<body>
<h1>agent_mem — live viewer</h1>
<div id="status">connecting…</div>
<table id="events">
  <thead><tr><th>time</th><th>type</th><th>session</th><th>id</th><th>payload</th></tr></thead>
  <tbody></tbody>
</table>
<script>
  const status = document.getElementById("status");
  const tbody = document.querySelector("#events tbody");
  const MAX_ROWS = 200;

  function row(evt) {
    const tr = document.createElement("tr");
    const ts = new Date(evt.timestamp).toLocaleTimeString();
    tr.innerHTML = `<td>${ts}</td>
                    <td class="type-${evt.type}">${evt.type}</td>
                    <td>${evt.sessionId || ""}</td>
                    <td>${evt.id || ""}</td>
                    <td><pre>${JSON.stringify(evt.payload || {}, null, 0)}</pre></td>`;
    tbody.prepend(tr);
    while (tbody.children.length > MAX_ROWS) tbody.removeChild(tbody.lastChild);
  }

  function connect() {
    const proto = location.protocol === "https:" ? "wss:" : "ws:";
    const url = `${proto}//${location.host}/stream`;
    const ws = new WebSocket(url);
    ws.onopen   = () => { status.textContent = "connected"; status.className = "ok"; };
    ws.onmessage = e => { try { row(JSON.parse(e.data)); } catch (err) {} };
    ws.onclose  = () => { status.textContent = "disconnected — retrying in 2s"; status.className = ""; setTimeout(connect, 2000); };
    ws.onerror  = () => { ws.close(); };
  }
  connect();
</script>
</body>
</html>
