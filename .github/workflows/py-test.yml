name: Python tests

on:
  pull_request:
    paths:
      - "medha-extraction/**"
      - ".github/workflows/py-test.yml"
  push:
    branches: [main, master]
    paths:
      - "medha-extraction/**"
      - ".github/workflows/py-test.yml"

concurrency:
  group: py-test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./medha-extraction
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14.5
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.5"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.6"

      - name: Sync deps
        run: uv sync --all-extras

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy medha

      - name: Pytest with coverage
        run: |
          uv run pytest --cov=medha --cov-report=xml --cov-report=term tests/
          # Warn below 70% during M0; tighten in Task 34.
          PCT=$(uv run python -c "import xml.etree.ElementTree as E; t=E.parse('coverage.xml').getroot(); print(int(float(t.attrib['line-rate'])*100))")
          echo "Coverage: ${PCT}%"
          if [ "$PCT" -lt 70 ]; then echo "::warning::python coverage ${PCT}% < 70%"; fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: py-coverage
          path: medha-extraction/coverage.xml
