# Local / production-like stack — agent-mem services only.
# All external services (PostgreSQL, Neo4j, RabbitMQ) are reached via .env.
#
# Usage: make run
#   Starts: go (API :3111), py (Python :5000), mcp (MCP HTTP :3114)

services:
  py:
    build:
      context: ./medha-extraction
    image: medha-extraction:local
    container_name: medha-extraction
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file: .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:5000/health').status==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks: [agentmem]

  go:
    build:
      context: ./medha-api
    image: medha-api:local
    container_name: medha-api
    restart: unless-stopped
    ports:
      - "3111:3111"
      - "3113:3113"
    env_file: .env
    depends_on:
      py:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/agent-mem-api", "-healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [agentmem]

  mcp:
    build:
      context: ./medha-api
      dockerfile: Dockerfile.mcp
    image: agent-mem-mcp:local
    container_name: agent-mem-mcp
    restart: unless-stopped
    ports:
      - "3114:3114"
    env_file: .env.mcp
    networks: [agentmem]

networks:
  agentmem:
    driver: bridge
